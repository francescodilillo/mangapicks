<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manga Picks</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@300;400;600&display=swap" rel="stylesheet"/>
<link rel="preload" href="rsc/user_avatar.jpg" as="image">
<link rel="preload" href="rsc/AI_avatar.png" as="image">
<link rel="preload" href="rsc/anon_avatar.png" as="image">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f0f17;
    --surface:   #17171f;
    --surface2:  #1e1e28;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #e8e8f0;
    --muted:     rgba(232,232,240,0.45);
    --faint:     rgba(232,232,240,0.2);
    --accent:    #f0a500;
    --accent-bg: rgba(240,165,0,0.1);
    --accent-bd: rgba(240,165,0,0.25);
    --user-bg:   #1e1e28;
    --ai-bg:     #131320;
    --radius:    12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .layout { display: flex; height: 100vh; }

  aside {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 20px;
  }

  .logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-size: 0.75rem; display: block; font-family: 'Sora', sans-serif; letter-spacing: 0; margin-top: 2px; }

  .profile-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-size: 12px;
  }
  .profile-card .label { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .profile-card .value { color: var(--text); font-weight: 600; }
  .profile-card .genres { color: var(--muted); margin-top: 6px; line-height: 1.5; font-size: 11px; }
  .profile-card .synced { color: var(--faint); font-size: 10px; margin-top: 8px; }

  .sidebar-btns { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

  .side-btn {
    width: 100%; padding: 9px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); font-size: 12px; cursor: pointer;
    font-family: 'Sora', sans-serif; text-align: left;
    transition: all 0.15s;
  }
  .side-btn:hover { background: var(--surface2); color: var(--text); }
  .side-btn.danger:hover { border-color: rgba(239,68,68,0.4); color: #f87171; }

  /* ── Main chat ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Ambient blobs */
  .blob { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(100px); z-index: 0; }
  .blob-1 { width: 500px; height: 500px; top: -200px; right: -100px; background: rgba(240,165,0,0.03); }
  .blob-2 { width: 400px; height: 400px; bottom: -150px; left: 10%; background: rgba(168,85,247,0.03); }

  .chat-header {
    position: relative; z-index: 1;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
  }
  .chat-header h2 { font-size: 14px; font-weight: 600; color: var(--text); }
  .chat-header p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Messages */
  #messages {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }

  .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai    { align-self: flex-start; }

  .msg-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; margin-top: 2px;
  }
  .msg.user .msg-avatar  { background: var(--accent-bg); border: 1px solid var(--accent-bd); }
  .msg.ai   .msg-avatar  { background: var(--surface2); border: 1px solid var(--border); }

  .msg-bubble {
    padding: 10px 14px; border-radius: var(--radius);
    line-height: 1.65; font-size: 13.5px;
  }
  .msg.user .msg-bubble { background: var(--user-bg); border: 1px solid var(--border2); border-top-right-radius: 3px; }
  .msg.ai   .msg-bubble { background: var(--ai-bg);   border: 1px solid var(--border);  border-top-left-radius: 3px; }

  /* Markdown inside AI bubbles */
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    font-family: 'Bebas Neue', cursive; letter-spacing: 0.05em;
    color: var(--accent); margin: 12px 0 4px; font-size: 1rem;
  }
  .msg-bubble p  { margin: 6px 0; }
  .msg-bubble ul,.msg-bubble ol { padding-left: 18px; margin: 6px 0; }
  .msg-bubble li { margin: 3px 0; }
  .msg-bubble strong { color: var(--text); font-weight: 600; }
  .msg-bubble em { color: var(--muted); }
  .msg-bubble a  { color: var(--accent); text-underline-offset: 2px; }
  .msg-bubble code {
    background: var(--surface2); padding: 1px 5px; border-radius: 4px;
    font-family: monospace; font-size: 12px; color: #c4b5fd;
  }
  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; margin: 0 2px; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Input bar */
  .input-bar {
    position: relative; z-index: 1;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
  }

  .suggestions {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 0 24px 10px; position: relative; z-index: 1;
  }
  .sugg-btn {
    font-size: 11px; padding: 5px 10px; border-radius: 99px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); cursor: pointer; font-family: 'Sora', sans-serif;
    transition: all 0.15s; white-space: nowrap;
  }
  .sugg-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent-bd); }

  #user-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text); font-family: 'Sora', sans-serif;
    font-size: 13.5px; padding: 10px 14px; resize: none; outline: none;
    max-height: 140px; line-height: 1.5;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: var(--accent-bd); }
  #user-input::placeholder { color: var(--faint); }

  #send-btn {
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #send-btn.stopping {background: red}

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 32px; gap: 12px;
  }
  .empty-icon { font-size: 2.5rem; }
  .empty-title { font-family: 'Bebas Neue', cursive; font-size: 1.4rem; letter-spacing: 0.06em; color: var(--text); }
  .empty-sub { color: var(--muted); font-size: 13px; max-width: 320px; line-height: 1.6; }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  @media (max-width: 600px) {
    aside { display: none; }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div>
      <div class="logo">Manga Picks<span>your personal rec engine</span></div>
    </div>

    <div class="profile-card" id="profile-card">
      <div class="label">Profile</div>
      <div class="value" id="pc-user">Loading…</div>
      <div class="genres" id="pc-genres"></div>
      <div class="synced" id="pc-sync"></div>
    </div>

    <div class="sidebar-btns">
      <button class="side-btn" onclick="sendSuggestion('Give me 8 manga recommendations based on my taste. Use my reading history to suggest something similar that I did not read yet')">
        🎲 Fresh recommendations
      </button>
      <button class="side-btn" onclick="sendSuggestion('Give me something dark and psychological that I did not read yet')">
        🌑 Dark & psychological
      </button>
      <button class="side-btn" onclick="sendSuggestion('Give me something with great world-building it does not matter if it is very popular or less known')">
        🌍 World-building
      </button>
      <button class="side-btn" onclick="sendSuggestion('Give me something short I can finish quickly - under 30 chapters - it does not have to differ too much from what I usually read')">
        ⚡ Short reads
      </button>
      <button class="side-btn danger" onclick="resetChat()">
        ↺ New session
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="chat-header">
      <div>
        <h2><span class="status-dot"></span>Manga Chat</h2>
        <p id="header-sub">Connecting to Ollama…</p>
      </div>
    </div>

    <div id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-title">What are you in the mood for?</div>
        <div class="empty-sub">Ask for recommendations, refine by mood, tell me what you've read — I'll remember the whole conversation.</div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="sugg-btn" onclick="sendSuggestion('Recommend me something based on my taste')">✨ Surprise me</button>
      <button class="sugg-btn" onclick="sendSuggestion('What sci-fi manga should I read?')">🚀 Sci-fi</button>
      <button class="sugg-btn" onclick="sendSuggestion('I want something with a strong female lead')">⚔️ Strong lead</button>
      <button class="sugg-btn" onclick="sendSuggestion('Hidden gems — something underrated')">💎 Hidden gems</button>
    </div>

    <div class="input-bar">
      <textarea id="user-input" rows="1" placeholder="Ask for recommendations, or say what you've read…" maxlength="1000"></textarea>
      <button id="send-btn" onclick="handleSendBtn()" title="Send">➤</button>
    </div>
  </main>
</div>

<script>
// ── Markdown renderer (no external deps) ─────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/^### (.+)$/gm,"<h3>$1</h3>")
    .replace(/^## (.+)$/gm,"<h2>$1</h2>")
    .replace(/^# (.+)$/gm,"<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/`(.+?)`/g,"<code>$1</code>")
    .replace(/\[(.+?)\]\((https?:\/\/.+?)\)/g,'<a href="$2" target="_blank">$1</a>')
    .replace(/(?<!href=")(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank">$1</a>')
    .replace(/^---$/gm,"<hr/>")
    .replace(/^\* (.+)$/gm,"<li>$1</li>")
    .replace(/^- (.+)$/gm,"<li>$1</li>")
    .replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>")
    .replace(/\n\n/g,"</p><p>")
    .replace(/\n/g,"<br/>")
    .replace(/^(?!<[hul])(.)/gm,"<p>$1")
    .replace(/([^>])$/gm,"$1</p>")
    .replace(/<p><\/p>/g,"")
    .replace(/<p>(<[hul])/g,"$1")
    .replace(/(<\/[hul][^>]*>)<\/p>/g,"$1");
}

// ── Auto-resize textarea ──────────────────────────────────────────────────────
const input = document.getElementById("user-input");
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 140) + "px";
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Profile ───────────────────────────────────────────────────────────────────
async function loadProfile() {
  try {
    const r = await fetch("/profile");
    const p = await r.json();

    const usernameEl = document.querySelector(".profile-username");
    const avatarEl = document.querySelector(".profile-avatar");

    if (p.username) {

      document.getElementById("pc-user").textContent = `@${p.username} · ${p.total} titles`;
      document.getElementById("pc-genres").textContent = p.top_genres.join(", ");
      document.getElementById("pc-sync").textContent = `synced ${p.fetched_date}`;
      document.getElementById("header-sub").textContent = `@${p.username} · ${p.total} manga in list`;
      userAvatarSrc = `rsc/user_avatar.jpg?v=${p.fetched_date}`;
    } else {

       userAvatarSrc = `rsc/anon_avatar.png?v=${p.fetched_date}`; // Use anonymous avatar if missing
       document.getElementById("header-sub").textContent = `User not logged in - ?? manga in list`;
       document.getElementById("pc-user").textContent = `Guest`;
       document.getElementById("pc-genres").textContent = `No info available on favourite genres.`;

    }

  } catch(e) {
    document.getElementById("header-sub").textContent = "Could not load profile";
  }
}

// ── Chat ──────────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const emptyState = document.getElementById("empty-state");
const suggestionsEl = document.getElementById("suggestions");
let reader = null;
let streaming = false;
let userAvatarSrc = "rsc/user_avatar.jpg";
let aiAvatarSrc = "rsc/AI_avatar.png";
let anonAvatarSrc = "rsc/anon_avatar.png";

function addMessage(role, content, isRaw = false) {
  if (emptyState) emptyState.remove();
  suggestionsEl.style.display = "none";

  const wrap = document.createElement("div");
  wrap.className = `msg ${role}`;

  const avatar = document.createElement("img");
  avatar.className = "msg-avatar";
  avatar.src = role === "user" ? userAvatarSrc : aiAvatarSrc;

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  if (isRaw) bubble.innerHTML = content;
  else bubble.innerHTML = marked.parse(content);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function addTypingIndicator() {
  const wrap = document.createElement("div");
  wrap.className = "msg ai";
  wrap.id = "typing";

  const avatar = document.createElement("div");
  avatar.className = "msg-avatar";
  avatar.textContent = "📚";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = `<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>`;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function setStreamingState(isStreaming) {
  streaming = isStreaming;
  const btn = document.getElementById("send-btn");
  if(streaming){
    btn.classList.add("stopping");
    btn.textContent = "■";
  }
  else {
    btn.classList.remove("stopping");
    btn.textContent = "➤";
  }
}

function handleSendBtn() {
  if (streaming) stopStreaming();
  else sendMessage();
}

function stopStreaming() {
  reader.cancel();
  setStreamingState(false);
}

async function sendMessage() {
  if (streaming) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  input.style.height = "auto";
  setStreamingState(true);

  addMessage("user", text);

  const typing = addTypingIndicator();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    typing.remove();
    const aiBubble = addMessage("ai", "", true);
    aiBubble.textContent = "";

    reader = res.body.getReader();
    const decoder = new TextDecoder();
    let rawText = "";
    let buffer = "";
    let isHtmlResponse = false

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {

          const data = JSON.parse(line.slice(6));
          console.log(data.token)
          if (data.error) { aiBubble.textContent = "Error: " + data.error; break; }
          if (data.token && data.isHTML) {
            isHtmlResponse = true;
            aiBubble.innerHTML = data.token;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          else if (data.token && !data.isHTML){
            rawText += data.token;
            const cleaned = rawText.replace(/\["\]\([^)]+\)/g, "");
            aiBubble.innerHTML = marked.parse(cleaned);
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
        } catch {}
      }

    }
  console.log(JSON.stringify(rawText));
  if (!isHtmlResponse) {
    aiBubble.innerHTML = marked.parse(rawText);
  }
  } catch(e) {
    typing.remove();
    addMessage("ai", "Connection error — is the server running?");
  }

  setStreamingState(false);
  input.focus();
}

function sendSuggestion(text) {
  input.value = text;
  sendMessage();
}

async function resetChat() {
  await fetch("/reset", { method: "POST" });
  messagesEl.innerHTML = `<div class="empty-state" id="empty-state">
    <div class="empty-icon">📚</div>
    <div class="empty-title">What are you in the mood for?</div>
    <div class="empty-sub">Ask for recommendations, refine by mood, tell me what you've read — I'll remember the whole conversation.</div>
  </div>`;
  suggestionsEl.style.display = "flex";
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadProfile();
input.focus();
</script>
</body>
</html>
